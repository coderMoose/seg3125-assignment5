<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="NBA Analytics dashboard preview">
  <defs>
    <clipPath id="card"><rect width="400" height="300" rx="0"/></clipPath>
  </defs>
  <g clip-path="url(#card)">
    <!-- surface -->
    <rect width="400" height="300" fill="#f8fafc"/>

    <!-- header -->
    <text x="24" y="40" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#0f172a">NBA Analytics</text>
    <text x="24" y="60" font-family="Inter, system-ui, sans-serif" font-size="11" letter-spacing="2" fill="#64748b">INTERACTIVE DASHBOARD</text>
    <!-- language pill -->
    <rect x="300" y="26" width="76" height="24" rx="12" fill="#f1f5f9" stroke="#e2e8f0"/>
    <rect x="303" y="29" width="34" height="18" rx="9" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="320" y="41" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#0f172a" text-anchor="middle">EN</text>
    <text x="356" y="41" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">FR</text>

    <!-- line chart card -->
    <rect x="20" y="78" width="220" height="196" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <!-- gridlines -->
    <g stroke="#eef2f7" stroke-width="1">
      <line x1="40" y1="120" x2="222" y2="120"/>
      <line x1="40" y1="160" x2="222" y2="160"/>
      <line x1="40" y1="200" x2="222" y2="200"/>
      <line x1="40" y1="240" x2="222" y2="240"/>
    </g>
    <!-- axis -->
    <line x1="40" y1="100" x2="40" y2="248" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="40" y1="248" x2="222" y2="248" stroke="#cbd5e1" stroke-width="1"/>
    <!-- three player lines -->
    <polyline fill="none" stroke="#2a78d6" stroke-width="2.5" points="52,150 90,168 128,120 166,110 204,132"/>
    <polyline fill="none" stroke="#eb6834" stroke-width="2.5" points="52,200 90,140 128,150 166,128 204,96"/>
    <polyline fill="none" stroke="#008300" stroke-width="2.5" points="52,176 90,182 128,138 166,142 204,158"/>
    <g fill="#2a78d6"><circle cx="52" cy="150" r="3"/><circle cx="90" cy="168" r="3"/><circle cx="128" cy="120" r="3"/><circle cx="166" cy="110" r="3"/><circle cx="204" cy="132" r="3"/></g>
    <g fill="#eb6834"><circle cx="52" cy="200" r="3"/><circle cx="90" cy="140" r="3"/><circle cx="128" cy="150" r="3"/><circle cx="166" cy="128" r="3"/><circle cx="204" cy="96" r="3"/></g>
    <g fill="#008300"><circle cx="52" cy="176" r="3"/><circle cx="90" cy="182" r="3"/><circle cx="128" cy="138" r="3"/><circle cx="166" cy="142" r="3"/><circle cx="204" cy="158" r="3"/></g>

    <!-- bar chart card (horizontal bars) -->
    <rect x="252" y="78" width="128" height="196" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <g>
      <rect x="292" y="104" width="78" height="14" rx="4" fill="#eb6834"/>
      <rect x="292" y="128" width="66" height="14" rx="4" fill="#eda100"/>
      <rect x="292" y="152" width="60" height="14" rx="4" fill="#2a78d6"/>
      <rect x="292" y="176" width="48" height="14" rx="4" fill="#1baf7a"/>
      <rect x="292" y="200" width="40" height="14" rx="4" fill="#008300"/>
      <rect x="292" y="224" width="30" height="14" rx="4" fill="#e87ba4"/>
    </g>
    <line x1="292" y1="98" x2="292" y2="244" stroke="#cbd5e1" stroke-width="1"/>
    <g fill="#94a3b8">
      <rect x="264" y="107" width="20" height="8" rx="2"/>
      <rect x="264" y="131" width="20" height="8" rx="2"/>
      <rect x="264" y="155" width="20" height="8" rx="2"/>
      <rect x="264" y="179" width="20" height="8" rx="2"/>
      <rect x="264" y="203" width="20" height="8" rx="2"/>
      <rect x="264" y="227" width="20" height="8" rx="2"/>
    </g>
  </g>
</svg>
